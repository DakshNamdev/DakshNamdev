<svg xmlns="http://www.w3.org/2000/svg" width="340" height="200" viewBox="0 0 340 200"><style>
@keyframes gpsc-fade{from{opacity:0}to{opacity:1}}
@keyframes gpsc-rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes gpsc-grow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes gpsc-pop{from{opacity:0;transform:scale(.55)}to{opacity:1;transform:scale(1)}}
@keyframes gpsc-wipe{from{transform:translateX(calc(-1 * var(--gpsc-w,420px)))}to{transform:translateX(0)}}
@keyframes gpsc-tint{from{filter:sepia(.7) saturate(4) hue-rotate(-70deg)}to{filter:sepia(0) saturate(1) hue-rotate(0)}}
@keyframes gpsc-rgb{0%{filter:hue-rotate(0deg) saturate(1)}50%{filter:hue-rotate(180deg) saturate(1.7)}100%{filter:hue-rotate(360deg) saturate(1)}}.gpsc-item{animation:gpsc-fade 0.84s ease both calc(var(--gpsc-i,0) * 0.336s)}.arc{animation:gpsc-pop 0.98s ease both calc(var(--gpsc-i,0) * 0.336s);transform-box:fill-box;transform-origin:center}rect.bar{animation:gpsc-grow 0.84s cubic-bezier(.2,.7,.3,1) both calc(var(--gpsc-i,0) * 0.098s);transform-box:fill-box;transform-origin:center bottom}.gpsc-reveal{animation:gpsc-wipe 2.52s linear both calc(var(--gpsc-i,0) * 0.336s)}@media (prefers-reduced-motion:reduce){.gpsc-root,.gpsc-root *,.gpsc-item,.gpsc-chart,rect.bar,.arc,.gpsc-reveal{animation:none!important}}</style><style>* {
          font-family: 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif
